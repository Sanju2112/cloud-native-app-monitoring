---
- name: Deploy Docker Compose stack to EC2
  hosts: ec2
  gather_facts: false
  vars:
    app_path: "{{ app_path | default('/home/ubuntu/project-5-devops') }}"
    repo_src: "{{ repo_src | default('.') }}"

  tasks:
    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: "{{ app_path }}"
        state: directory
        mode: "0755"

    - name: Sync project files to EC2
      ansible.builtin.command:
        cmd: >-
          rsync -az --delete
          --exclude .git
          --exclude .github
          {{ repo_src }}/
          {{ ansible_user }}@{{ ansible_host }}:{{ app_path }}/
      delegate_to: localhost

    - name: Pull latest container images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ app_path }}"

    - name: Recreate and start services
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ app_path }}"
